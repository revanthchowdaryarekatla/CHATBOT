<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>
    
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({name,price,discountPrice,imgSource}){
        return (
          <div>
            <img src={imgSource} width="100px" />
            <p>{name}</p>
            {/*discountPrice&&<p>Price:${price}</p>*/}
            {/*discountPrice&&<>
              <del><p>Price:${price}</p></del>
              <p>Discount Price:${price}</p>
            </>*/}
            {discountPrice?<>
              <del><p>Price:${price}</p></del>
              <p>Discount Price:${price}</p></>:<>
              <p>Price:${price}</p></>
            }
            <button>Add to cart</button>
          </div>
        );
      }
      function App(){
        return (
          <>
            <ProductDetails name="Cotton socks" price="10.90" discountPrice="5.45"
            imgSource="./IMAGES/cotton-socks.png" />
            <ProductDetails name="Tennis balls" price="6.00"
            imgSource="./IMAGES/tennis-balls.png"  />
            <ProductDetails name="Plain T-shirts" price="7.99"
            imgSource="./IMAGES/plain-t-shirt.png"  />
          </>
        );
      }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
