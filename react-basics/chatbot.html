<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family: Arial;
        margin-bottom: 0;
        margin-top: 0;
      }
      .send-button{
        background-color: rgb(25,135,84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }
      .app-container{
        max-width: 600px;
        margin: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .robot{
        display: flex;
        justify-content: flex-start;
        align-items: start;
      }
      .user{
        display: flex;
        justify-content: end;
        align-items: start;
      }
      .chat-message-text{
        background-color: rgb(238,238,238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-profile{
        width: 45px;
      }
      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
      .welcome-message{
        color:rgb(120,120,120) ;
        text-align: center;
      }
      .loading-image{
        height: 40px;
        margin: -15px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
    
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function useAutoScroll(dependencies){
        let containerRef=React.useRef(null);
        React.useEffect(()=>{
          let containerElem=containerRef.current;
          if(containerElem){
            containerElem.scrollTop=containerElem.scrollHeight;
          }
        },dependencies);
        return containerRef;
      }
      function ChatbotInput({chatMessages,setChatMessages}){
        let [inputText,setInputText]=React.useState('');
        let [isLoading,setIsLoading]=React.useState(false);
        function saveInputText(event){
          setInputText(event.target.value);
        }
        async function sendMessage(){
          if(isLoading||inputText==='')
          return;
          setIsLoading(true);
          setInputText('');
          let newChatMessages=[
            ...chatMessages,{
              message:inputText,
              sender:'user',
              id:crypto.randomUUID()
            }
          ];
          setChatMessages([
            ...newChatMessages,{
              message:<img className="loading-image"
              src="./IMAGES/loading-spinner.gif"/>,
              sender:'robot',
              id:crypto.randomUUID()
            }
          ]);
          let response=await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages,{
              message:response,
              sender:'robot',
              id:crypto.randomUUID()
            }
          ]);
          setIsLoading(false);
        }
        function sendMess(event){
          if(event.key==='Enter'){
            sendMessage();
          }
          if(event.key=='Escape'){
            setInputText('');
          }
        }
        return <div className="chat-input-container">
          <input 
            placeholder="Send a message to Chatbot"
            size="30"
            onKeyDown={sendMess}
            className="chat-input"
            onChange={saveInputText}
            value={inputText}
          />
          <button onClick={sendMessage}
          className="send-button"
          >Send</button>
        </div>
      }
      function ChatMessage({message,sender}){
        //let message=props.message;
        //let sender=props.sender;
        //let {message,sender}=props;
        return (
          <div className={sender}>
            {sender==='robot'&&(
              <img src="./robot.png" className="chat-message-profile" />
            )}
            <div className="chat-message-text">
              {message}  
            </div>
            {sender=='user'&&(
              <img src="./user.png" className="chat-message-profile" />
            )}
          </div>
        );
      }
      function ChatMessages({chatMessages}){
        //let [chatMessages,setChatMessages]=array;
        //let chatMessages=array[0];
        //let setChatMessages=array[1];
        let chatMessagesRef=useAutoScroll([chatMessages]);
        return (
          <div className="chat-messages-container" ref={chatMessagesRef}>
            {chatMessages.map((chatMessage)=>{
                return (
                  <ChatMessage message={chatMessage.message} sender={chatMessage.sender}
                  key={chatMessage.id} />
                );
              })}
          </div>
        );
      }
      function App(){
        let [chatMessages,setChatMessages]=React.useState([]);
        return (
          <div className="app-container">
            {chatMessages.length===0&&(<p className="welcome-message">Welcome to the chatbot project! Send a message using the textbox below.</p>)}
            <ChatMessages chatMessages={chatMessages} />
            <ChatbotInput chatMessages={chatMessages} setChatMessages={setChatMessages} />
          </div>
        );
      }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
